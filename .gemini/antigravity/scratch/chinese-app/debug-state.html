<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐛 Debug State</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 { color: #f39c12; }
    .section {
      background: #2a2a2a;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
    }
    .success { background: #27ae60; color: white; padding: 15px; border-radius: 6px; margin: 10px 0; }
    .error { background: #c0392b; color: white; padding: 15px; border-radius: 6px; margin: 10px 0; }
    .warning { background: #f39c12; color: #1a1a1a; padding: 15px; border-radius: 6px; margin: 10px 0; font-weight: bold; }
    button {
      background: #f39c12;
      color: #1a1a1a;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
      font-size: 14px;
    }
    button:hover { background: #e67e22; }
    pre {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid #3a3a3a;
      max-height: 500px;
      overflow-y: auto;
      font-size: 12px;
    }
    .stat {
      display: inline-block;
      background: #3a3a3a;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 6px;
      border-left: 4px solid #f39c12;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #f39c12;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>🐛 Debug State - Kiểm Tra Dữ Liệu Chi Tiết</h1>
  
  <div class="section">
    <h2>📊 Tổng Quan</h2>
    <div id="overview"></div>
  </div>

  <div class="section">
    <h2>🔍 Chi Tiết Từng Video</h2>
    <button onclick="showDetails()">Xem Chi Tiết</button>
    <div id="details"></div>
  </div>

  <div class="section">
    <h2>📄 Raw JSON</h2>
    <button onclick="showRaw()">Xem Raw Data</button>
    <button onclick="copyRaw()">📋 Copy JSON</button>
    <button onclick="downloadRaw()">💾 Download JSON</button>
    <div id="raw"></div>
  </div>

  <div class="section">
    <h2>🔧 Công Cụ Sửa Lỗi</h2>
    <button onclick="fixMissingVideoIds()">🔧 Sửa VideoID Thiếu</button>
    <button onclick="fixMissingTitles()">✏️ Sửa Title Thiếu</button>
    <button onclick="fixAll()">🚀 Sửa Tất Cả</button>
    <div id="fix-result"></div>
  </div>

  <script>
    let playlistData = null;

    function loadData() {
      try {
        const data = localStorage.getItem('dictationPlaylist');
        
        if (!data || data === '[]' || data === 'null') {
          document.getElementById('overview').innerHTML = '<div class="error">❌ KHÔNG CÓ DỮ LIỆU trong localStorage!</div>';
          return null;
        }

        playlistData = JSON.parse(data);
        
        if (!Array.isArray(playlistData)) {
          document.getElementById('overview').innerHTML = '<div class="error">❌ Dữ liệu không hợp lệ (không phải array)</div>';
          return null;
        }

        // Stats
        const total = playlistData.length;
        const withVideoId = playlistData.filter(v => v.videoId && v.videoId !== 'playlist_marker').length;
        const withoutVideoId = playlistData.filter(v => !v.videoId || v.videoId === 'playlist_marker').length;
        const withPlaylist = playlistData.filter(v => v.playlist && !v.isPlaylistMarker).length;
        const withoutPlaylist = playlistData.filter(v => !v.playlist && !v.isPlaylistMarker).length;
        const markers = playlistData.filter(v => v.isPlaylistMarker).length;
        const withTitle = playlistData.filter(v => v.title).length;
        const withoutTitle = playlistData.filter(v => !v.title).length;
        const withUrl = playlistData.filter(v => v.url).length;
        const withoutUrl = playlistData.filter(v => !v.url).length;

        document.getElementById('overview').innerHTML = `
          <div class="success">✅ TÌM THẤY DỮ LIỆU!</div>
          
          <div class="stat">
            <div class="stat-value">${total}</div>
            <div class="stat-label">Tổng Items</div>
          </div>
          
          <div class="stat">
            <div class="stat-value">${withVideoId}</div>
            <div class="stat-label">✅ Có VideoID</div>
          </div>
          
          <div class="stat">
            <div class="stat-value" style="color:#e74c3c">${withoutVideoId}</div>
            <div class="stat-label">❌ Thiếu VideoID</div>
          </div>
          
          <div class="stat">
            <div class="stat-value">${withPlaylist}</div>
            <div class="stat-label">📁 Có Playlist</div>
          </div>
          
          <div class="stat">
            <div class="stat-value">${withoutPlaylist}</div>
            <div class="stat-label">📄 Chưa Có Playlist</div>
          </div>
          
          <div class="stat">
            <div class="stat-value">${markers}</div>
            <div class="stat-label">🏷️ Markers</div>
          </div>
          
          <div class="stat">
            <div class="stat-value">${withTitle}</div>
            <div class="stat-label">✅ Có Title</div>
          </div>
          
          <div class="stat">
            <div class="stat-value" style="color:#e74c3c">${withoutTitle}</div>
            <div class="stat-label">❌ Thiếu Title</div>
          </div>
          
          <div class="stat">
            <div class="stat-value">${withUrl}</div>
            <div class="stat-label">✅ Có URL</div>
          </div>
          
          <div class="stat">
            <div class="stat-value" style="color:#e74c3c">${withoutUrl}</div>
            <div class="stat-label">❌ Thiếu URL</div>
          </div>
        `;

        return playlistData;

      } catch (error) {
        document.getElementById('overview').innerHTML = `<div class="error">❌ Lỗi: ${error.message}</div>`;
        console.error(error);
        return null;
      }
    }

    function showDetails() {
      if (!playlistData) {
        document.getElementById('details').innerHTML = '<div class="error">Không có dữ liệu!</div>';
        return;
      }

      let html = '<div style="margin-top:20px">';
      
      playlistData.forEach((item, index) => {
        const hasVideoId = item.videoId && item.videoId !== 'playlist_marker';
        const hasTitle = !!item.title;
        const hasUrl = !!item.url;
        const hasPlaylist = !!item.playlist;
        
        const status = hasVideoId && hasTitle && hasUrl ? '✅' : '⚠️';
        const bgColor = hasVideoId && hasTitle && hasUrl ? '#27ae60' : '#e67e22';
        
        html += `
          <div style="background:#333;padding:12px;margin:8px 0;border-radius:6px;border-left:4px solid ${bgColor}">
            <div style="font-weight:bold;margin-bottom:8px">${status} Video #${index + 1}</div>
            <div style="font-size:12px;color:#999;line-height:1.8">
              <div>🆔 ID: <code>${item.id || '❌ THIẾU'}</code></div>
              <div>📺 VideoID: <code>${item.videoId || '❌ THIẾU'}</code></div>
              <div>✏️ Title: <code>${item.title || '❌ THIẾU'}</code></div>
              <div>🔗 URL: <code>${item.url ? item.url.substring(0, 50) + '...' : '❌ THIẾU'}</code></div>
              <div>📁 Playlist: <code>${item.playlist || 'Chưa có'}</code></div>
              <div>📊 Progress: <code>${item.completedCount || 0}/${item.totalCount || 0}</code></div>
              <div>🏷️ Marker: <code>${item.isPlaylistMarker ? 'Yes' : 'No'}</code></div>
            </div>
          </div>
        `;
      });
      
      html += '</div>';
      document.getElementById('details').innerHTML = html;
    }

    function showRaw() {
      if (!playlistData) return;
      document.getElementById('raw').innerHTML = `<pre>${JSON.stringify(playlistData, null, 2)}</pre>`;
    }

    function copyRaw() {
      if (!playlistData) return;
      navigator.clipboard.writeText(JSON.stringify(playlistData, null, 2)).then(() => {
        alert('✅ Đã copy JSON vào clipboard!');
      });
    }

    function downloadRaw() {
      if (!playlistData) return;
      const blob = new Blob([JSON.stringify(playlistData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `playlist-debug-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      alert('✅ Đã tải xuống file!');
    }

    function fixMissingVideoIds() {
      if (!playlistData) return;
      
      let fixed = 0;
      playlistData.forEach(item => {
        if (!item.videoId && item.url) {
          const match = item.url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
          if (match) {
            item.videoId = match[1];
            fixed++;
          }
        }
      });

      if (fixed > 0) {
        localStorage.setItem('dictationPlaylist', JSON.stringify(playlistData));
        document.getElementById('fix-result').innerHTML = `<div class="success">✅ Đã sửa ${fixed} VideoID!</div>`;
        loadData();
      } else {
        document.getElementById('fix-result').innerHTML = `<div class="warning">Không có VideoID nào cần sửa</div>`;
      }
    }

    function fixMissingTitles() {
      if (!playlistData) return;
      
      let fixed = 0;
      playlistData.forEach(item => {
        if (!item.title) {
          item.title = `Video ${item.id || Date.now()}`;
          fixed++;
        }
      });

      if (fixed > 0) {
        localStorage.setItem('dictationPlaylist', JSON.stringify(playlistData));
        document.getElementById('fix-result').innerHTML = `<div class="success">✅ Đã sửa ${fixed} Title!</div>`;
        loadData();
      } else {
        document.getElementById('fix-result').innerHTML = `<div class="warning">Không có Title nào cần sửa</div>`;
      }
    }

    function fixAll() {
      if (!playlistData) return;
      
      let fixedVideoId = 0;
      let fixedTitle = 0;
      let fixedId = 0;
      
      playlistData.forEach(item => {
        // Fix ID
        if (!item.id) {
          item.id = Date.now() + Math.random();
          fixedId++;
        }
        
        // Fix VideoID
        if (!item.videoId && item.url) {
          const match = item.url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
          if (match) {
            item.videoId = match[1];
            fixedVideoId++;
          }
        }
        
        // Fix Title
        if (!item.title) {
          item.title = `Video ${item.id}`;
          fixedTitle++;
        }
        
        // Fix numeric fields
        if (typeof item.totalCount !== 'number') item.totalCount = 0;
        if (typeof item.completedCount !== 'number') item.completedCount = 0;
      });

      localStorage.setItem('dictationPlaylist', JSON.stringify(playlistData));
      
      document.getElementById('fix-result').innerHTML = `
        <div class="success">
          ✅ ĐÃ SỬA XONG!<br><br>
          🆔 ID: ${fixedId}<br>
          📺 VideoID: ${fixedVideoId}<br>
          ✏️ Title: ${fixedTitle}<br><br>
          <strong>👉 Hãy quay lại app và refresh (F5)!</strong>
        </div>
      `;
      
      loadData();
    }

    // Auto load on page load
    window.onload = function() {
      loadData();
    };
  </script>
</body>
</html>
